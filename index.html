<style>
:root {
  --altura-carrossel: clamp(200px, 24rem, 420px);
  --padding-container: 2%;
  --pagebkgd: #FAFAFA;
  --pagetextcolor: #090909;
  --btn-size: 48px;
  --btn-icon-size: 22px;
  --loadingbkgdcolor: #f0f0f0;
}

html {
  font-size: 16px;
}

* {
  margin: 0;
  padding: 0;
}

p {
  margin: 0;
  padding: 0;
  font-size: 1rem;
}

body {
  margin: 0;
  background: var(--pagebkgd);
  font-family: Arial;
  color: var(--pagetextcolor);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* =========================
   RODAPÉ DA PÁGINA
========================= */
.rodape {
  width: 100%;
  text-align: center;
  padding: 8px 0;
  background: transparent;
  color: var(--pagetextcolor);
  font-size: 0.8rem;
}

/* =========================
   CONTAINER DO CARROSSEL
========================= */
#container-carrossel {
  width: 100%;
  height: var(--altura-carrossel);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0;
  margin: 0;
  position: relative;
}

.swiper {
  width: 100%;
  height: var(--altura-carrossel);
  border-radius: 5px;
  overflow: hidden;
}

.swiper-wrapper {
  height: var(--altura-carrossel);
}

.swiper-slide {
  display: flex;
  justify-content: center;
  align-items: center;
  background: transparent;
  height: var(--altura-carrossel);
  width: auto;
  transform: none;
  transition: transform 0.3s ease;
  box-sizing: border-box;
  position: relative;
}

.swiper-slide-active {
  transform: scale(1);
  z-index: 2;
}

.swiper-slide > img {
  display: block;
}

.swiper-slide img {
  max-width: 100%;
  max-height: var(--altura-carrossel);
  width: auto;
  height: auto;
  display: block;
}

.legenda {
  position: absolute;
  width: fit-content;
  min-width: 0;
  max-width: 100%;
  padding: 10px;
  color: #fff;
  background: rgba(0,0,0,0.5);
  text-align: center;
  font-size: 14px;
  box-sizing: border-box;
  white-space: normal;
  bottom: 0;
  width: 100%;
  left: 0;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.modal.ativo {
  opacity: 1;
  transform: scale(1);
}

.modal-conteudo {
  position: relative;
  display: inline-block;
  line-height: 0;
}

.modal-conteudo img {
  display: block;
  max-width: 90vw;
  max-height: 90vh;
  width: auto;
  height: auto;
}

.modal-legenda {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 10px;
  background: rgba(0,0,0,0.55);
  color: #fff;
  font-size: 13px;
  text-align: center;
  box-sizing: border-box;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

#modalImg {
  transform-origin: center;
  will-change: transform;
  cursor: grab;
  user-select: none;
}

/* =========================
   BOTÕES DE NAVEGAÇÃO
========================= */
.modal-fechar {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 18px;
}

.modal-fechar:hover {
  background: rgba(0,0,0,0.8);
}

.swiper-button-next,
.swiper-button-prev,
.modal-nav,
.modal-fechar {
  z-index: 10001;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  outline: none;
  border: none;
  font-family: swiper-icons;
  width: var(--btn-size);
  height: var(--btn-size);
}

.swiper-button-next,
.swiper-button-prev {
  transition: transform 0.15s ease, background 0.2s ease;
}

.modal-nav, .modal-fechar {
  transition: background 0.2s ease, opacity 0.2s ease;
}

.swiper-button-next::after,
.swiper-button-prev::after,
.modal-nav::after,
.modal-fechar::after {
  font-weight: 900;
  color: #FAFAFA;
  font-size: var(--btn-icon-size);
}

.swiper-button-next:hover,
.swiper-button-prev:hover,
.modal-fechar:hover {
  transform: scale(1.1);
  background: rgba(0,0,0,0.7);
}

.modal-nav:hover {
  transform: translateY(-50%) scale(1.15);
  background: rgba(0,0,0,0.7);
}

.swiper-button-next:active,
.swiper-button-prev:active {
  transform: scale(0.95);
}

.modal-fechar:active {
  transform: scale(0.95);
}

.modal-nav:active {
  transform: translateY(-50%);
  background: rgba(0,0,0,0.7);
}

.modal-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%) scale(1);
  z-index: 10001;
}

.modal-fechar.oculto,
.modal-legenda.oculto,
.modal-nav.oculto {
  opacity: 0;
  pointer-events: none;
}

.modal-prev { left: 10px; }
.modal-next { right: 10px; }
.modal-next::after { content: 'next'; }
.modal-prev::after { content: 'prev'; }

.modal-fechar::after {
  content: "✕";
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  line-height: 1;
  transform: translateY(-1px);
}

/* =========================
   CONTEÚDO ABAIXO
========================= */
#container-conteudo {
  width: 90%;
  padding: var(--padding-container);
  text-align: left;
}

#texto {
  text-align: center;
}

#container-conteudo > div:not(#texto) {
  text-align: left;
}

/* =========================
   ESTRUTURA DA PÁGINA
========================= */
#pagina {
  padding: 2%;
  box-sizing: border-box;
  flex: 1;
}

#titulo {
  text-align: center;
  margin: 0 0 20px;
}

#titulo h1 {
  margin: 0;
}

/* =========================
   ANIMAÇÃO DE CARREGAMENTO
========================= */
#loading {
  position: absolute;
  height: 100%;
  z-index: 10;
  overflow: hidden;
  border-radius: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
  inset: 0;
  transition: none; /*opacity 0.4s ease; */
  background: var(--loadingbkgdcolor); 
}

#loading::after {
  content: "";
  position: absolute;
  inset: 0;
/*
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(0,0,0,0.05) 50%,
    transparent 100%
  );
*/
  animation: none; /* shimmer-loading 1.4s infinite; */
}

.spinner {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
  border: 4px solid #DDD;
  border-top: 4px solid #999;
}

#loading.hidden {
  opacity: 0;
  pointer-events: none;
}

/* =========================
   SKELETON DAS IMAGENS
========================= */
.skeleton-slide {
  background: #1b1b1b;
  position: relative;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.skeleton-box {
  width: 100%;
  height: 100%;
  background: #222;
  position: relative;
  overflow: hidden;
}

.skeleton-box::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 150%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

.skeleton-legenda {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: rgba(30,30,30,0.7);
}

/* =========================
   CONTROLE DAS SETAS
========================= */
.swiper-button-disabled {
  opacity: 0;
}

/* escondidas durante loading/skeleton */
#container-carrossel.loading .swiper-button-next,
#container-carrossel.loading .swiper-button-prev {
  opacity: 0;
  pointer-events: none;
  display: none;
}

/* visíveis somente após carregamento */
#container-carrossel:not(.loading) .swiper-button-next,
#container-carrossel:not(.loading) .swiper-button-prev {
  display: flex;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes shimmer {
  100% { transform: translateX(100%); }
}

@keyframes shimmer-loading {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
</style>

</head>

<body>

  <div id="pagina">
    <div id="titulo">
      <h1>Galeria de fotos</h1>
    </div>
    <div id="container-carrossel">
      <div class="swiper">
        <div id="loading">
          <div class="spinner"></div>
        </div>
        <div class="swiper-wrapper" id="slides"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
      </div>
    </div>
    <div id="container-conteudo">
      <div id="texto">
        <p><b>Galeria de fotos criada com biblioteca Swiper.js</b></p>
      </div>
    </div>
  </div>

  <div id="rodape" class="rodape">  2026 - Fabio de Almeida Martins - Direitos reservados  </div>
  <div id="modal" class="modal">
    <div class="modal-conteudo">
      <button class="modal-fechar" onclick="fecharModal()"></button>
      <img id="modalImg">
      <button class="modal-nav modal-prev"></button>
      <button class="modal-nav modal-next"></button>
      <div id="modalLegenda" class="modal-legenda"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script type="text/javascript" charset="utf-8" src="scripts.js" defer></script>

<script>
const extensoes = ["jpg","jpeg","webp","gif","png"];
const container = document.getElementById("slides");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const loading = document.getElementById("loading");

let swiper = null;

// zoom/pan
const ZOOM_AMOUNT = 2.5;
let scale = 1;
const minScale = 1;
const maxScale = 5;

let x = 0, y = 0;

// controle de interação
let isHolding = false;
let isDragging = false;

let holdTimer = null;
const HOLD_DELAY = 150;

let lastX = 0, lastY = 0;
let startX = 0, startY = 0;

let velocityX = 0;
let velocityY = 0;

let raf = null;
let currentIndex = 0;
let imagensCarregadas = [];

let legendasMap = {};

let listenersAtivos = false;

const btnFechar = document.querySelector(".modal-fechar");
const modalLegenda = document.getElementById("modalLegenda");
const modalNavs = document.querySelectorAll(".modal-nav");

const imgPath = "img";

/* --------------------------
   NORMALIZAR STRING
---------------------------*/
function normalizarNome(nome) {
  try {
    return decodeURIComponent((nome || ""))
      .split("/").pop().split("?")[0].trim().toLowerCase();
  } catch {
    return (nome || "")
      .split("/").pop().split("?")[0].trim().toLowerCase();
  }
}

/* --------------------------
   CLAMP (limite de pan)
---------------------------*/
function clampPan() {
  if (!modalImg.naturalWidth) return;
  const vw = modal.clientWidth;
  const vh = modal.clientHeight;
  const renderedW = modalImg.offsetWidth * scale;
  const renderedH = modalImg.offsetHeight * scale;
  const maxX = Math.max(0, (renderedW - vw) / 2);
  const maxY = Math.max(0, (renderedH - vh) / 2);
  x = Math.min(maxX, Math.max(-maxX, x));
  y = Math.min(maxY, Math.max(-maxY, y));
}

/* --------------------------
   RENDER
---------------------------*/
function render() {
  clampPan();
  modalImg.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}

/* --------------------------
   RESET
---------------------------*/
function reset() {
  scale = 1;
  x = 0;
  y = 0;
  velocityX = 0;
  velocityY = 0;
  isHolding = false;
  isDragging = false;
  modalImg.style.cursor = "zoom-in";
  modalImg.style.transition = "";
  render();
}

/* --------------------------
   ZOOM
---------------------------*/
function zoomAt(cx, cy, newScale) {
  const rect = modal.getBoundingClientRect();
  const mx = cx - rect.left - rect.width / 2;
  const my = cy - rect.top - rect.height / 2;
  const k = newScale / scale;
  x = mx - k * (mx - x);
  y = my - k * (my - y);
  scale = newScale;
}

function animateZoomIn(cx, cy) {
  modalImg.style.transition = "transform 0.2s ease";
  zoomAt(cx, cy, ZOOM_AMOUNT);
  render();
  setTimeout(() => modalImg.style.transition = "", 200);
}

function animateZoomOut() {
  modalImg.style.transition = "transform 0.25s ease";
  scale = 1;
  x = 0;
  y = 0;
  render();
  setTimeout(() => modalImg.style.transition = "", 250);
}

/* --------------------------
   LIMPEZA DE TIMERS E RAF
---------------------------*/
function stopInertia() {
  if (raf) cancelAnimationFrame(raf);
  raf = null;
}

function limparRecursos() {
  clearTimeout(holdTimer);
  stopInertia();
}

/* --------------------------
   ABRIR / FECHAR
---------------------------*/
function abrirModal(src, index, legenda) {
  modal.style.display = "flex";
  requestAnimationFrame(() => {
    modal.classList.add("ativo");
  });
  modalImg.src = src;
  modalLegenda.textContent = legenda || "";
  modalLegenda.style.display = legenda ? "block" : "none";
  modalImg.onload = () => reset();
  if (swiper?.autoplay) swiper.autoplay.stop();
  ativarListeners();
}

function fecharModal() {
  limparRecursos();
  modal.classList.remove("ativo");
  setTimeout(() => {
    modal.style.display = "none";
  }, 200);
  desativarListeners();
  requestAnimationFrame(() => {
    loading.classList.add("hidden");
    document.getElementById("container-carrossel").classList.remove("loading");
    setTimeout(() => loading.style.display = "none", 400);
  });
  stopInertia();
  reset();
  if (swiper?.autoplay) swiper.autoplay.start();
}

/* --------------------------
   ZOOM (WHEEL)
---------------------------*/
modal.addEventListener("wheel", e => {
  e.preventDefault();
  const newScale = Math.min(maxScale, Math.max(minScale, scale * (1 - e.deltaY * 0.001)));
  zoomAt(e.clientX, e.clientY, newScale);
  render();
}, { passive: false });

/* --------------------------
   MOUSEDOWN
---------------------------*/
modalImg.addEventListener("mousedown", e => {
  e.preventDefault();
  isHolding = true;
  isDragging = false;
  startX = lastX = e.clientX;
  startY = lastY = e.clientY;
  velocityX = 0;
  velocityY = 0;
  btnFechar.classList.add("oculto");
  modalLegenda.classList.add("oculto");
  modalNavs.forEach(btn => btn.classList.add("oculto"));
  ativarListeners(); // ✅ ATIVA HANDLERS
  if (scale <= minScale) {
    holdTimer = setTimeout(() => {
      if (isHolding) {
        animateZoomIn(startX, startY);
        modalImg.style.cursor = "grab";
      }
    }, HOLD_DELAY);
  } else {
    modalImg.style.cursor = "grabbing";
  }
});

/* --------------------------
   HANDLERS (SUBSTITUI LISTENERS GLOBAIS)
---------------------------*/
function mouseMoveHandler(e) {
  if (!isHolding) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  const totalDx = e.clientX - startX;
  const totalDy = e.clientY - startY;
  if (Math.abs(totalDx) > 4 || Math.abs(totalDy) > 4) {
    isDragging = true;
    clearTimeout(holdTimer);
  }
  if (scale > minScale) {
    x += dx;
    y += dy;
    velocityX = dx;
    velocityY = dy;
    render();
    modalImg.style.cursor = "grabbing";
  }
  lastX = e.clientX;
  lastY = e.clientY;
}

function mouseUpHandler() {
  if (!isHolding) return;
  clearTimeout(holdTimer);
  isHolding = false;
  isDragging = false;
  stopInertia();
  animateZoomOut();
  modalImg.style.cursor = "zoom-in";
  btnFechar.classList.remove("oculto");
  modalLegenda.classList.remove("oculto");
  modalNavs.forEach(btn => btn.classList.remove("oculto"));
  desativarListeners(); // ✅ REMOVE HANDLERS
}

/* --------------------------
   LISTENER DE MOUSE GLOBAL
---------------------------*/
function ativarListeners() {
  if (listenersAtivos) return;
  listenersAtivos = true;
  window.addEventListener("mousemove", mouseMoveHandler);
  window.addEventListener("mouseup", mouseUpHandler);
}

function desativarListeners() {
  if (!listenersAtivos) return;
  listenersAtivos = false;
  window.removeEventListener("mousemove", mouseMoveHandler);
  window.removeEventListener("mouseup", mouseUpHandler);
}

/* --------------------------
   INÉRCIA
---------------------------*/
function startInertia() {
  stopInertia();
  function step() {
    if (Math.abs(velocityX) < 0.3 && Math.abs(velocityY) < 0.3) {
      stopInertia();
      return;
    }
    x += velocityX;
    y += velocityY;
    velocityX *= 0.90;
    velocityY *= 0.90;
    render();
    raf = requestAnimationFrame(step);
  }
  raf = requestAnimationFrame(step);
}

/* --------------------------
   SWIPER / IMAGENS
---------------------------*/
async function carregarImagem(i) {
  return new Promise(resolve => {
    let idx = 0;
    function tentar() {
      if (idx >= extensoes.length) return resolve({ encontrado: false, i });
      const src = `${imgPath}/imagem${i}.${extensoes[idx]}`;
      const img = new Image();
      img.onload = () => resolve({ src, index: i, encontrado: true });
      img.onerror = () => { idx++; tentar(); };
      img.src = src;
    }
    tentar();
  });
}

function montarLegenda(nomeArquivo) {
  const info = legendasMap[nomeArquivo];
  if (!info) return nomeArquivo;
  const textoLegenda = info.legenda?.trim();
  const textoCreditos = info.creditos ? `Imagem: ${info.creditos.trim()}` : "";
  return [textoLegenda, textoCreditos].filter(Boolean).join(" / ");
}

/* --------------------------
   LISTENER DO TECLADO
---------------------------*/
window.addEventListener("keydown", keydownHandler);

/* --------------------------
   CARREGAR TODAS
---------------------------*/
async function carregarTodas() {
  const containerCarrossel = document.getElementById("container-carrossel");
  containerCarrossel.classList.add("loading");

  criarSkeletons(1);

  try {
    await carregarLegendas();
  } catch(e) {
    console.warn("Erro legendas:", e);
  }

  const validos = [];
  const limiteFalhas = 3;
  let falhasSeguidas = 0;

  for (let i = 1; i <= 9999; i += 3) {

    const batch = [
      carregarImagem(i),
      carregarImagem(i + 1),
      carregarImagem(i + 2)
    ];

    const resultados = await Promise.all(batch);

    for (const img of resultados) {

      if (!img || !img.encontrado) {
        falhasSeguidas++;
      } else {
        validos.push(img);
        falhasSeguidas = 0;
      }

      if (falhasSeguidas >= limiteFalhas) break;
    }

    if (falhasSeguidas >= limiteFalhas) break;
  }

  imagensCarregadas = validos;
  container.innerHTML = "";

  validos.forEach(img => {
    const slide = document.createElement("div");
    slide.className = "swiper-slide";

    const el = document.createElement("img");
    el.src = img.src;

    const leg = document.createElement("div");
    leg.className = "legenda";

    const nomeArquivo = normalizarNome(img.src);
    leg.textContent = montarLegenda(nomeArquivo);

    el.onclick = () => {
      currentIndex = imagensCarregadas.indexOf(img);
      abrirModal(img.src, img.index, leg.textContent);
    };

    slide.appendChild(el);
    slide.appendChild(leg);
    container.appendChild(slide);
  });

  if (swiper) {
    swiper.destroy(true, true);
    swiper = null;
  }

  swiper = new Swiper('.swiper', {
    loop: true,
    autoplay: { delay: 3000 },
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev'
    },
    speed: 600,
    effect: "coverflow",
    centeredSlides: true,
    slidesPerView: "auto",
    spaceBetween: 40,
    coverflowEffect: {
      rotate: 0,
      stretch: -40,
      depth: 100,
      modifier: 2.0,
      slideShadows: false
    }
  });

  requestAnimationFrame(() => {
    loading.classList.add("hidden");
    containerCarrossel.classList.remove("loading");
    setTimeout(() => loading.style.display = "none", 400);
  });
}

/* --------------------------
   FECHAR MODAL
---------------------------*/
modal.onclick = e => {
  if (e.target === modal) fecharModal();
};

function keydownHandler(e) {
  const modalAberto = modal.classList.contains("ativo");

  if (e.key === "Escape") {
    if (modalAberto) fecharModal();
    return;
  }

  // 🔥 MODAL ATIVO → navega imagens do modal
  if (modalAberto) {
    if (scale > minScale) return;

    if (e.key === "ArrowRight") {
      currentIndex = (currentIndex + 1) % imagensCarregadas.length;
      navegarModal(currentIndex);
    } 
    else if (e.key === "ArrowLeft") {
      currentIndex = (currentIndex - 1 + imagensCarregadas.length) % imagensCarregadas.length;
      navegarModal(currentIndex);
    }

    return;
  }

  // 🔥 MODAL FECHADO → navega Swiper
  if (e.key === "ArrowRight") {
    swiper?.slideNext();
  } 
  else if (e.key === "ArrowLeft") {
    swiper?.slidePrev();
  }
}

function navegarModal(idx) {
  const img = imagensCarregadas[idx];
  const nomeArquivo = normalizarNome(img.src);
  const legenda = montarLegenda(nomeArquivo);
  abrirModal(img.src, img.index, legenda);
}

/* --------------------------
   BOTÕES DO MODAL (SETAS)
---------------------------*/
document.querySelector(".modal-next").onclick = () => {
  if (scale > minScale) return;
  currentIndex = (currentIndex + 1) % imagensCarregadas.length;
  navegarModal(currentIndex);
};

document.querySelector(".modal-prev").onclick = () => {
  if (scale > minScale) return;
  currentIndex = (currentIndex - 1 + imagensCarregadas.length) % imagensCarregadas.length;
  navegarModal(currentIndex);
};

/* --------------------------
   LEGENDAS
---------------------------*/
async function carregarLegendas() {
  try {
    const url = new URL("./img/imagens.json", window.location.href);
    const res = await fetch(url.href);

    if (!res.ok) {
      console.warn("JSON não encontrado:", res.status);
      legendasMap = {};
      return;
    }

    const index = await res.json();

    if (!Array.isArray(index)) {
      console.warn("JSON inválido");
      legendasMap = {};
      return;
    }

    legendasMap = {};

    index.forEach(item => {
      const nome =
        item.nome_arquivo ||
        item.nomearquivo ||
        item.nomeArquivo ||
        item.filename ||
        item.file ||
        "";

      const chave = normalizarNome(nome);
      if (!chave) return;

      legendasMap[chave] = {
        legenda: item.legenda || item.descricao || "",
        creditos: item.creditos || item.credito || item.author || ""
      };
    });

    console.log("MAPA FINAL:", legendasMap);

  } catch (err) {
    console.error("Erro ao carregar JSON:", err);
    legendasMap = {};
  }
}

/* --------------------------
   CARREGAMENTO DO SKELETON
---------------------------*/
function criarSkeletons(qtd = 10) {
  container.innerHTML = "";
  for (let i = 0; i < qtd; i++) {
    const slide = document.createElement("div");
    slide.className = "swiper-slide skeleton-slide";
    const box = document.createElement("div");
    box.className = "skeleton-box";
    slide.appendChild(box);
    container.appendChild(slide);
  }
}

/* --------------------------
   START
---------------------------*/
carregarTodas();
