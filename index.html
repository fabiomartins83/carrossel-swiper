<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrossel com Swiper</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
:root {
  --altura-carrossel: clamp(200px, 24rem, 420px);
  --padding-container: 2%;
  --pagebkgd: #FAFAFA;
  --pagetextcolor: #090909;
}

html {
  font-size: 16px;
}

* {
  margin: 0;
  padding: 0;
}

p {
  margin: 0;
  padding: 0;
  font-size: 1rem;
}

body {
  margin: 0;
  background: var(--pagebkgd);
  font-family: Arial;
  color: var(--pagetextcolor);
  display: flex; /*block; */
  flex-direction: column;
  min-height: 100vh;
/*
  align-items: center;
  justify-content: center;
  height: 100vh;
*/
}

/* =========================
   RODAPÉ DA PÁGINA
========================= */
.rodape {
  width: 100%;
  text-align: center;
  padding: 8px 0;
  background: transparent;
  color: var(--pagetextcolor);
  font-size: 0.8rem;
}

/* =========================
   CONTAINER DO CARROSSEL
========================= */
#container-carrossel {
  width: 100%;
  height: var(--altura-carrossel);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0;
  margin: 0;
  position: relative; /* âncora para o #loading */
}

.swiper {
  width: 100%;
  height: var(--altura-carrossel);
  border-radius: 5px;
  overflow: hidden;
}

/* 🔥 ESSENCIAL: Swiper precisa preencher altura */
.swiper-wrapper {
  height: var(--altura-carrossel);
}

.swiper-slide {
  display: flex;
  justify-content: center;
  align-items: center;
  background: transparent;
  height: var(--altura-carrossel);
  width: auto;
  transform: none; /* scale(0.7); */
  transition: transform 0.3s ease;
  box-sizing: border-box;
  position: relative;
}

.swiper-slide-active {
  transform: scale(1);
  z-index: 2;
}

/* wrapper interno que abraça a imagem */
.swiper-slide > img {
  display: block;
}

/* imagem ajustada corretamente */
.swiper-slide img {
  max-width: 100%;
  max-height: var(--altura-carrossel);
  width: auto;
  height: auto;
  display: block;
}

.legenda {
  position: absolute;
  width: fit-content;
  min-width: 0;
  max-width: 100%;
  padding: 10px;
  color: #fff;
  background: rgba(0,0,0,0.5);
  text-align: center;
  font-size: 14px;
  box-sizing: border-box;
  white-space: nowrap;
  bottom: 0;
  width: 100%;
  left: 0; /*50%;
  transform: translateX(-50%); */
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  /*overflow: hidden; */
}

.modal-conteudo {
  position: relative;
  display: inline-block; /* se ajusta ao tamanho real da imagem */
  line-height: 0; /* remove espaço extra abaixo da img */
}

.modal-conteudo img {
  display: block;
  max-width: 90vw;
  max-height: 90vh;
  width: auto;   /* preserva proporção horizontal */
  height: auto;  /* preserva proporção vertical */
}

.modal-fechar {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 36px;
  height: 36px;
  background: rgba(0,0,0,0.5);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10000;
  transition: background 0.2s ease, opacity 0.2s ease;
}

.modal-fechar:hover {
  background: rgba(0,0,0,0.8);
}

.modal-legenda {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 10px;
  background: rgba(0,0,0,0.55);
  color: #fff;
  font-size: 13px;
  text-align: center;
  box-sizing: border-box;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.modal-fechar.oculto,
.modal-legenda.oculto {
  opacity: 0;
  pointer-events: none;
}

#modalImg {
  transform-origin: center;
  will-change: transform;
  cursor: grab;
  user-select: none;
}

/* =========================
   BOTÕES DE NAVEGAÇÃO
========================= */
.swiper-button-next,
.swiper-button-prev,
.modal-nav,
.modal-fechar {
  z-index: 10001;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease, background 0.2s ease;
  cursor: pointer;
  outline: none;
  border: none;
  font-family: swiper-icons;
}
.swiper-button-next::after,
.swiper-button-prev::after,
.modal-nav::after,
.modal-fechar::after {
  font-size: 22px;
  font-weight: 900;
  color: #fff;
}
.swiper-button-next:hover,
.swiper-button-prev:hover,
.modal-fechar:hover {
  transform: scale(1.1);
  background: rgba(0,0,0,0.7);
}
.modal-nav:hover {
  transform: translateY(-50%); /* 🔥 mantém posição sem zoom */
  background: rgba(0,0,0,0.5); /* 🔥 sem alteração visual */
}
.swiper-button-next:active,
.swiper-button-prev:active,
.modal-fechar:active {
  transform: scale(0.9);
}
.modal-nav:active {
  transform: translateY(-50%); /* 🔥 evita “afundar” */
}
.modal-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10001;
  transition: none;
}
.modal-prev { left: 10px; }
.modal-next { right: 10px; }
.modal-next::after { content: 'next'; }
.modal-prev::after { content: 'prev'; }
.modal-fechar::after {
  content: "✕";
  font-size: 22px;
  font-weight: 900;
  color: #fff;
}

/* =========================
   CONTEÚDO ABAIXO
========================= */
#container-conteudo {
  width: 90%;
  padding: var(--padding-container);  
  text-align: left;
}

#texto {
    text-align: center;
}

/* garante que futuros blocos NÃO herdem centralização */
#container-conteudo > div:not(#texto) {
  text-align: left;
}

/* =========================
   ESTRUTURA DA PÁGINA
========================= */
#pagina {
  padding: 2%;
  box-sizing: border-box;
  flex: 1;
}

#titulo {
  text-align: center;
  margin: 0 0 20px;
}

#titulo h1 {
  margin: 0;
}

/* =========================
   ANIMAÇÃO DE CARREGAMENTO 
========================= */
#loading {
  position: absolute;
  height: 100%;
  z-index: 10;
  overflow: hidden;
  border-radius: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
  inset: 0;
  transition: opacity 0.4s ease;
  background: #f0f0f0;
}

#loading::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(0,0,0,0.05) 50%,
    transparent 100%
  );
  animation: shimmer-loading 1.4s infinite;
}

.spinner {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
  border: 4px solid #DDD;
  border-top: 4px solid #999;
}

#loading.hidden {
  opacity: 0;
  pointer-events: none;
}

/* =========================
   SKELETON DAS IMAGENS
========================= */
.skeleton-slide {
  background: #1b1b1b;
  position: relative;
  overflow: hidden;
  /* 🔥 GARANTE MESMO LAYOUT DO SLIDE REAL */
  display: flex;
  justify-content: center;
  align-items: center;
}

.skeleton-box {
  width: 100%;
  height: 100%;
  background: #222;
  position: relative;
  overflow: hidden;
}

/* efeito shimmer */
.skeleton-box::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 150%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

/* legenda skeleton alinhada igual real */
.skeleton-legenda {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: rgba(30,30,30,0.7);
}

/* =========================
   CONTROLE DAS SETAS
========================= */
.swiper-button-disabled {
  opacity: 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes shimmer {
  100% {
    transform: translateX(100%);
  }
}

@keyframes shimmer-loading {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

</style>
</head>

<body>

<div id="pagina">

  <div id="titulo">
    <h1>Galeria de fotos</h1>
  </div>

    <!-- 🔥 CARROSSEL (TOPO 50%) -->
  <div id="container-carrossel">
    <div class="swiper">
      <div id="loading">
        <div class="spinner"></div>
        <!-- <p>Carregando...</p> -->
      </div>
      <div class="swiper-wrapper" id="slides"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>

  <!-- 🔥 CONTEÚDO (ABAIXO) -->
  <div id="container-conteudo">
    <div id="texto">
      <p><b>Galeria de fotos criada com biblioteca Swiper.js</b></p>
    </div>
  </div>
  
</div>

<!-- 🔥 RODAPÉ -->
<div id="rodape" class="rodape">  2026 - Fabio de Almeida Martins  </div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-conteudo">
    <button class="modal-fechar" onclick="fecharModal()"></button>
    <img id="modalImg">
    <button class="modal-nav modal-prev"></button>
    <button class="modal-nav modal-next"></button>
    <div id="modalLegenda" class="modal-legenda"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const extensoes = ["jpg","jpeg","webp","gif","png"];
const container = document.getElementById("slides");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const loading = document.getElementById("loading");

let swiper = null;

// zoom/pan
const ZOOM_AMOUNT = 2.5;
let scale = 1;
const minScale = 1;
const maxScale = 5;

let x = 0, y = 0;

// controle de interação
let isHolding = false;
let isDragging = false;

let holdTimer = null;
const HOLD_DELAY = 150;

let lastX = 0, lastY = 0;
let startX = 0, startY = 0;

let velocityX = 0;
let velocityY = 0;

let raf = null;
let currentIndex = 0;
let imagensCarregadas = []; // lista global para navegação por setas

let legendasMap = {};

let listenersAtivos = false;

const btnFechar = document.querySelector(".modal-fechar");
const modalLegenda = document.getElementById("modalLegenda");

/* --------------------------
   NORMALIZAR STRING
---------------------------*/
function normalizarNome(nome) {
  return (nome || "")
    .split("/").pop()      // remove caminho
    .split("?")[0]         // remove querystring
    .trim()
    .toLowerCase();
}

/* --------------------------
   CLAMP (limite de pan)
---------------------------*/
function clampPan() {
  if (!modalImg.naturalWidth) return;

  const vw = modal.clientWidth;
  const vh = modal.clientHeight;

  const renderedW = modalImg.offsetWidth * scale;
  const renderedH = modalImg.offsetHeight * scale;

  const maxX = Math.max(0, (renderedW - vw) / 2);
  const maxY = Math.max(0, (renderedH - vh) / 2);

  x = Math.min(maxX, Math.max(-maxX, x));
  y = Math.min(maxY, Math.max(-maxY, y));
}

/* --------------------------
   RENDER
---------------------------*/
function render() {
  clampPan();
  modalImg.style.transform =
    `translate(${x}px, ${y}px) scale(${scale})`;
}

/* --------------------------
   RESET
---------------------------*/
function reset() {
  scale = 1;
  x = 0;
  y = 0;
  velocityX = 0;
  velocityY = 0;
  isHolding = false;
  isDragging = false;
  modalImg.style.cursor = "zoom-in";
  modalImg.style.transition = "";
  render();
}

/* --------------------------
   ZOOM
---------------------------*/
function zoomAt(cx, cy, newScale) {
  const rect = modal.getBoundingClientRect();

  const mx = cx - rect.left - rect.width / 2;
  const my = cy - rect.top - rect.height / 2;

  const k = newScale / scale;

  x = mx - k * (mx - x);
  y = my - k * (my - y);
  scale = newScale;
}

function animateZoomIn(cx, cy) {
  modalImg.style.transition = "transform 0.2s ease";
  zoomAt(cx, cy, ZOOM_AMOUNT);
  render();
  setTimeout(() => modalImg.style.transition = "", 200);
}

function animateZoomOut() {
  modalImg.style.transition = "transform 0.25s ease";
  scale = 1;
  x = 0;
  y = 0;
  render();
  setTimeout(() => modalImg.style.transition = "", 250);
}

/* --------------------------
   LIMPEZA DE TIMERS E RAF
---------------------------*/
function stopInertia() {
  if (raf) cancelAnimationFrame(raf);
  raf = null;
}
function limparRecursos() {
  clearTimeout(holdTimer);
  stopInertia();
}

/* --------------------------
   ABRIR / FECHAR
---------------------------*/
function abrirModal(src, index, legenda) {
  modal.style.display = "flex";
  modalImg.src = src;

  const modalLegenda = document.getElementById("modalLegenda");
  modalLegenda.textContent = legenda || "";
  modalLegenda.style.display = legenda ? "block" : "none";

  modalImg.onload = () => reset();

  swiper?.autoplay.stop();
}

function fecharModal() {
  limparRecursos();
  modal.style.display = "none"; // 🔥 FALTAVA ISSO
  requestAnimationFrame(() => {
    loading.classList.add("hidden");
    const containerCarrossel = document.getElementById("container-carrossel");
    containerCarrossel.classList.remove("loading"); // 🔥 AQUI
    setTimeout(() => loading.style.display = "none", 400);
  });
  stopInertia();
  reset();

  swiper?.autoplay.start();
}

/* --------------------------
   ZOOM (WHEEL)
---------------------------*/
modal.addEventListener("wheel", e => {
  e.preventDefault();

  const newScale = Math.min(
    maxScale,
    Math.max(minScale, scale * (1 - e.deltaY * 0.001))
  );

  zoomAt(e.clientX, e.clientY, newScale);
  render();
}, { passive: false });

/* --------------------------
   MOUSEDOWN
---------------------------*/
modalImg.addEventListener("mousedown", e => {
  e.preventDefault();

  isHolding = true;
  isDragging = false;

  startX = lastX = e.clientX;
  startY = lastY = e.clientY;

  velocityX = 0;
  velocityY = 0;

  btnFechar.classList.add("oculto");
  modalLegenda.classList.add("oculto");

  if (scale <= minScale) {
    holdTimer = setTimeout(() => {
      if (isHolding) {
        animateZoomIn(startX, startY);
        modalImg.style.cursor = "grab";
      }
    }, HOLD_DELAY);
  } else {
    modalImg.style.cursor = "grabbing";
  }
});

/* --------------------------
   MOUSEMOVE
---------------------------*/
window.addEventListener("mousemove", e => {
  if (!isHolding) return;

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  const totalDx = e.clientX - startX;
  const totalDy = e.clientY - startY;

  if (Math.abs(totalDx) > 4 || Math.abs(totalDy) > 4) {
    isDragging = true;
    clearTimeout(holdTimer);
  }

  if (scale > minScale) {
    x += dx;
    y += dy;

    velocityX = dx;
    velocityY = dy;

    render();
    modalImg.style.cursor = "grabbing";
  }

  lastX = e.clientX;
  lastY = e.clientY;
});

/* --------------------------
   MOUSEUP
---------------------------*/
window.addEventListener("mouseup", () => {
  if (!isHolding) return;

  clearTimeout(holdTimer);

  isHolding = false;
  isDragging = false;

  stopInertia();

  animateZoomOut();
  modalImg.style.cursor = "zoom-in";

  btnFechar.classList.remove("oculto");
  modalLegenda.classList.remove("oculto");
});

/* --------------------------
   INÉRCIA
---------------------------*/
function startInertia() {
  stopInertia();

  function step() {
    if (Math.abs(velocityX) < 0.3 && Math.abs(velocityY) < 0.3) {
      stopInertia();
      return;
    }

    x += velocityX;
    y += velocityY;

    velocityX *= 0.90;
    velocityY *= 0.90;

    render();
    raf = requestAnimationFrame(step);
  }

  raf = requestAnimationFrame(step);
}

/* --------------------------
   SWIPER / IMAGENS
---------------------------*/
async function carregarImagem(i) {
  return new Promise(resolve => {
    let idx = 0;
    let falhasSeguidas = 0;

    function tentar() {
      if (idx >= extensoes.length) {
        return resolve({ encontrado: false, i });
      }

      const src = `img/imagem${i}.${extensoes[idx]}`;
      const img = new Image();

      img.onload = () => {
        resolve({ src, index: i, encontrado: true });
      };

      img.onerror = () => {
        idx++;
        falhasSeguidas++;

        // 🔥 se 3 extensões falharem, encerra imediatamente
        if (falhasSeguidas >= extensoes.length) {
          return resolve({ encontrado: false, i });
        }

        tentar();
      };

      img.src = src;
    }

    tentar();
  });
}

/* --------------------------
   LISTENER DE MOUSE GLOBAL
---------------------------*/
function ativarListeners() {
  if (listenersAtivos) return;
  listenersAtivos = true;

  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
}

function desativarListeners() {
  listenersAtivos = false;

  window.removeEventListener("mousemove", onMove);
  window.removeEventListener("mouseup", onUp);
}

/* --------------------------
   CARREGAR TODAS
---------------------------*/
async function carregarTodas() {
  const containerCarrossel = document.getElementById("container-carrossel");
  containerCarrossel.classList.add("loading");

  criarSkeletons(1);
  // loading é ocultado apenas após o carregamento (no final da função)

  try {
    await carregarLegendas();
  } catch(e) {
    console.warn("Erro legendas:", e);
  }
  
  const validos = [];
  const limiteFalhas = 3;

  let falhasSeguidas = 0;

  for (let i = 1; i <= 9999; i++) { // limite alto de segurança
    const img = await carregarImagem(i);

    if (img.encontrado) {
      validos.push(img);
      falhasSeguidas = 0; // reset ao achar imagem
    } else {
      falhasSeguidas++;
    }

    // 🔥 condição de parada: 3 seguidas não encontradas
    if (falhasSeguidas >= limiteFalhas) {
      break;
    }
  }

  imagensCarregadas = validos; // salva para navegação por setas

  // 3. LIMPA skeletons de forma segura
  container.innerHTML = "";

  validos.forEach(img => {
    const slide = document.createElement("div");
    slide.className = "swiper-slide";

    const el = document.createElement("img");
    el.src = img.src;

    const leg = document.createElement("div");
    leg.className = "legenda";

    const nomeArquivo = normalizarNome(img.src);
    const info = legendasMap[nomeArquivo];

    if (info) {
      const textoLegenda = info.legenda?.trim();
      const textoCreditos = info.creditos
        ? `Imagem: ${info.creditos.trim()}`
        : "";

      leg.textContent = [textoLegenda, textoCreditos]
        .filter(Boolean)
        .join(" / ");
    } else {
      leg.textContent = nomeArquivo;
    }

    el.onload = () => {
      leg.style.width = "100%";
    };

    el.onclick = () => {
      currentIndex = imagensCarregadas.indexOf(img);
      abrirModal(img.src, img.index, leg.textContent);
    };

    slide.appendChild(el);
    slide.appendChild(leg);
    container.appendChild(slide);
  });

  // 5. DESTROI swiper antigo (se existir)
  if (swiper) {
    swiper.destroy(true, true);
    swiper = null;
  }

  swiper = new Swiper('.swiper', {
    loop: true,
    autoplay: { delay: 3000 },
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev'
    },
    speed: 600,

    effect: "coverflow",
    centeredSlides: true,
    slidesPerView: "auto",
    spaceBetween: 40,

    coverflowEffect: {
      rotate: 0,
      stretch: -40, /* compensa o espaço vazio do scale(0.70) */
      depth: 100,
      modifier: 2.0,
      slideShadows: false
    }
  });
  requestAnimationFrame(() => {
    loading.classList.add("hidden");
    setTimeout(() => loading.style.display = "none", 400);
  });
}

/* --------------------------
   FECHAR MODAL
---------------------------*/
modal.onclick = e => {
  if (e.target === modal) fecharModal();
};

window.addEventListener("keydown", e => {
  if (e.key === "Escape") { fecharModal(); return; }
  if (scale > minScale) return; // bloqueia setas no modo zoom

  const modalAberto = modal.style.display === "flex";

  if (e.key === "ArrowRight") {
    if (modalAberto) {
      currentIndex = (currentIndex + 1) % imagensCarregadas.length;
      navegarModal(currentIndex);
    } else {
      swiper?.slideNext();
    }
  } else if (e.key === "ArrowLeft") {
    if (modalAberto) {
      currentIndex = (currentIndex - 1 + imagensCarregadas.length) % imagensCarregadas.length;
      navegarModal(currentIndex);
    } else {
      swiper?.slidePrev();
    }
  }
});

function navegarModal(idx) {
  const img = imagensCarregadas[idx];
  const nomeArquivo = normalizarNome(img.src);
  const info = legendasMap[nomeArquivo];

  const legenda = info
    ? [
        info.legenda?.trim(),
        info.creditos ? `Imagem: ${info.creditos.trim()}` : ""
      ].filter(Boolean).join(" / ")
    : nomeArquivo;

  abrirModal(img.src, img.index, legenda);
}

/* --------------------------
   BOTÕES DO MODAL (SETAS)
---------------------------*/
document.querySelector(".modal-next").onclick = () => {
  if (scale > minScale) return; // respeita o zoom

  currentIndex = (currentIndex + 1) % imagensCarregadas.length;
  navegarModal(currentIndex);
};

document.querySelector(".modal-prev").onclick = () => {
  if (scale > minScale) return; // respeita o zoom

  currentIndex = (currentIndex - 1 + imagensCarregadas.length) % imagensCarregadas.length;
  navegarModal(currentIndex);
};

/* --------------------------
   CARREGAMENTO DE LEGENDA
---------------------------*/
async function carregarLegendas() {
  try {
    const url = new URL("./img/imagens.json", window.location.href);
    const res = await fetch(url.href);

    if (!res.ok) {
      console.warn("JSON não encontrado:", res.status);
      legendasMap = {};
      return;
    }

    const index = await res.json();

    if (!Array.isArray(index)) {
      console.warn("JSON inválido");
      legendasMap = {};
      return;
    }

    legendasMap = {};

    index.forEach(item => {

      // 🔥 ACEITA VÁRIOS NOMES DE COLUNA
      const nome =
        item.nome_arquivo ||
        item.nomearquivo ||
        item.nomeArquivo ||
        item.filename ||
        item.file ||
        "";

      const chave = normalizarNome(nome);

      if (!chave) return;

      legendasMap[chave] = {
        legenda: item.legenda || item.descricao || "",
        creditos: item.creditos || item.credito || item.author || ""
      };
    });

    console.log("MAPA FINAL:", legendasMap);

  } catch (err) {
    console.error("Erro ao carregar JSON:", err);
    legendasMap = {};
  }
}
/* --------------------------
   CARREGAMENTO DO SKELETON
---------------------------*/
function criarSkeletons(qtd = 10) {
  container.innerHTML = "";

  for (let i = 0; i < qtd; i++) {
    const slide = document.createElement("div");
    slide.className = "swiper-slide skeleton-slide";

    const box = document.createElement("div");
    box.className = "skeleton-box";

    slide.appendChild(box);
    container.appendChild(slide);
  }
}

/* --------------------------
   START
---------------------------*/
carregarTodas();
